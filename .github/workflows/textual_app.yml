name: textual app macos
on:
  push:
    branches: [ main ]

jobs:
  test:
    strategy:
      matrix:
        os: [ 'macos-15-large']
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: uv sync 
    - name: Run your tests
      run: uv run nuitka --mode=app --include-data-files=OsmosePresets.json=OsmosePresets.json --include-data-files='**.tcss=./' --remove-output --assume-yes-for-downloads osmose_presets.py
    - name: Zip entire workspace
      run: |
        zip -r osmose_presets_workspace.zip . -x '*.git*'
    - name: Upload workspace zip
      uses: actions/upload-artifact@v4
      with:
        name: osmose_presets_workspace
        path: osmose_presets_workspace.zip